<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="90" fill="#0f172a"/>

  <!-- 大六边形 - 代表教师模型 -->
  <polygon points="100,35 142.5,57.5 142.5,102.5 100,125 57.5,102.5 57.5,57.5" fill="none" stroke="url(#grad1)" stroke-width="4"/>

  <!-- 小六边形 - 代表学生模型 -->
  <polygon points="100,75 125,88.75 125,113.75 100,127.5 75,113.75 75,88.75" fill="url(#grad2)"/>

  <!-- 连接线 - 代表知识传递 -->
  <line x1="85" y1="70" x2="85" y2="95" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="100" y1="65" x2="100" y2="88" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="115" y1="70" x2="115" y2="95" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- 底部文字 M -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">MIMIC</text>
</svg>